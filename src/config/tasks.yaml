tasks:
  - id: architect_blueprint
    agent: architect
    description: |
      Read storage/analysis_report.json and design a complete serverless architecture blueprint.
      
      Your mission: Analyze the storage/analysis_report.json and design a complete serverless
      architecture in ONE operation that ensures ALL monolith functionality works in AWS.
      
      CRITICAL: Use ONE-TIME WRITE STRATEGY
      - Read storage/analysis_report.json ONCE
      - Design complete blueprint IN MEMORY
      - Write complete storage/blueprint.json ONCE (no incremental updates)
      - This avoids CrewAI's duplicate input detection mechanism
      
      ============================================================
      CORE PRINCIPLES
      ============================================================
      
      1. Preserve Functionality: Migrate what exists, do not add or remove features
      2. Basic Architecture: Use API Gateway + Lambda + DynamoDB/S3 + Cognito (if needed)
      3. Infrastructure Over Code: Authentication is infrastructure, not application code
      4. Delete, Don't Migrate: Auth endpoints are deleted, not converted to Lambda
      
      CRITICAL: "Infrastructure over Code" for Authentication
      
      Authentication should be handled by AWS managed services (Cognito), NOT by Lambda code.
      This means:
      - Do NOT create Lambda functions for register/login/logout
      - Do NOT write token validation code in Lambda
      - Frontend calls Cognito SDK directly (AWS Amplify, Cognito JS SDK)
      - API Gateway validates tokens automatically (Cognito Authorizer)
      - Lambda only receives pre-validated user identity via event.requestContext
      
      ============================================================
      ARCHITECTURE DESIGN GUIDELINES
      ============================================================
      
      1. LAMBDA FUNCTIONS DESIGN
      Map endpoints to Lambda functions.
      
      CRITICAL (STRICT RULE FOR THIS CONVERSION):
      - Define an endpoint as (HTTP method + path), e.g. GET /items/{id}.
      - You MUST create ONE separate Lambda function for EACH endpoint.
      - Do NOT group multiple endpoints into one Lambda (no "AppFunction", no internal router/switch).
      - You MAY organize lambdas by domain for folders/naming, but handlers remain split.
      
      Naming / organization guidance (keep LLM autonomy):
      - Prefer clear, stable names that reflect intent, e.g. {domain}-{action} or {method}-{resource}.
      - In blueprint.lambda_functions[*].entry_points, each Lambda should list exactly one route path.
      - If the monolith has both GET /items and POST /items, they become two Lambdas.
      - Domain inference (NOT rigid):
        - Derive domain by reasoning from the monolith structure (modules/packages/routes/controllers), not by string-splitting names.
        - You MAY keep the monolith’s logical grouping (e.g., orders, products, users, admin) if it exists.
        - If the monolith is flat or ambiguous, choose a reasonable domain grouping (e.g., core, misc) and document it in blueprint metadata/notes.
      ============================================================
      LAMBDA COMMUNICATION STRATEGY (Sync + Async)
      ============================================================
      
      Lambda-to-Lambda communication uses one of three mechanisms,
      decided per-relationship based on entry_point_dependencies:
      
        A) SYNCHRONOUS — AWS SDK Direct Invoke (RequestResponse)
           Use when: caller NEEDS callee's return value for its own HTTP response
           Implementation: boto3 lambda.invoke(InvocationType='RequestResponse')
           Record in: lambda_invoke_permissions
        
        B) ASYNC — SQS Queue (Point-to-Point)
           Use when: caller does NOT need callee's result; single consumer
           Implementation: caller sends SQS message; callee becomes SQS-triggered Lambda
           Record in: sqs_queues + caller's publishes_to + consumer Lambda definition
        
        C) ASYNC — EventBridge (Fan-Out / Event Chain)
           Use when: one action triggers 2+ independent consumers across domains
           OR: cross-domain workflow chain (A completes → event → B starts)
           Implementation: caller publishes event; consumers triggered by EventBridge rules
           Record in: eventbridge_rules + caller's publishes_to + consumer Lambda definitions
      
      General rules:
      - Do NOT use HTTP fetch/requests/axios to call another Lambda via API Gateway URL
      - Pass target FunctionName / QueueUrl / EventBusName via environment variables
      - Invoker Lambda MUST have the corresponding SAM policy
        (LambdaInvokePolicy / SQSSendMessagePolicy / EventBridgePutEventsPolicy)
      
      ============================================================
      CALL GRAPH DATA (from static analysis)
      ============================================================
      
      analysis_report.json includes pre-computed call graph fields
      extracted mechanically (AST for Python, regex for JS), NOT LLM-inferred:
      
      1. "call_graph": Raw cross-file function call edges.
         Each edge: {caller_file, caller_function, caller_line,
                     callee_module, callee_symbol}
      
      2. "entry_point_dependencies": Aggregated view per HTTP entry_point.
         For each entry_point, lists ALL cross-file functions it calls.
         This is your PRIMARY data source for all Lambda communication design.
      
      STEP-BY-STEP PROCEDURE:
      
      Step 1 — IDENTIFY cross-Lambda calls:
        For each entry in entry_point_dependencies, check if its cross_file_calls
        reference modules that serve OTHER entry_points. If yes, this is a
        cross-Lambda relationship.
        If an entry_point only calls functions from its OWN module or
        utility helpers (db clients, validators), it is a simple "Worker"
        Lambda with NO cross-Lambda invocations.
      
      Step 2 — CLASSIFY each cross-Lambda relationship:
        For each relationship, determine the communication mechanism:
        Q1: Does the caller need the callee's return value for its HTTP response?
          YES → Synchronous (mechanism A) → record in lambda_invoke_permissions
          NO  → Q2
        Q2: Does this caller trigger operations in 2+ different service domains?
          YES → EventBridge (mechanism C) → record in eventbridge_rules
          NO  → SQS (mechanism B) → record in sqs_queues
      
      Step 3 — DESIGN async resources:
        For SQS candidates:
          - Create sqs_queues entry (with DLQ, visibility_timeout, max_receive_count)
          - API Lambda: add publishes_to [{type: "sqs", target: "<QueueName>"}]
          - Consumer Lambda: set trigger_type="sqs", sqs_source="<QueueName>"
          - Consumer Lambda source_files = callee module files
        For EventBridge candidates:
          - Create eventbridge_rules entry (with source, detail_type, targets list)
          - API Lambda: add publishes_to [{type: "eventbridge", source, detail_type}]
          - Consumer Lambdas: set trigger_type="eventbridge", event_pattern={...}
          - Consumer Lambda source_files = callee module files
      
      Step 4 — HANDLE edge cases:
        - If entry_point_dependencies is empty → all Lambdas are independent workers
          → set sqs_queues=[], eventbridge_rules=[], lambda_invoke_permissions=[]
        - If ALL cross-Lambda calls need synchronous results → no async needed
          → set sqs_queues=[], eventbridge_rules=[]
        - Consumer Lambdas (trigger_type="sqs"/"eventbridge") do NOT have entry_points
          (they are not API-triggered)
        - Consumer Lambdas still need a handler, runtime, and source_files
      
      IMPORTANT: You do NOT need to use ReadFileTool to read source files
      for understanding call relationships. The call_graph data provides
      this mechanically. You SHOULD still use ReadFileTool ONLY for:
      - DynamoDB schema files (listed in dynamodb_info.schema_files)
      
      HOW TO DERIVE source_files for each Lambda:
      From entry_point_dependencies, collect the handler file plus all
      callee_module file paths. This gives Code Developer the exact file
      list to read, without further exploration.
      
      ============================================================
      RULE 1: "DELETE, DON'T MIGRATE" - Auth Endpoints
      ============================================================
      
      IF analysis_report.features contains "Auth" tag:
      
      Drop These Endpoints (add to dropped_functions):
      - POST /register, /login, /logout, /refresh-token, /reset-password
      - GET /me
      - Reason: "Replaced by Cognito - Frontend calls AWS Amplify directly"
      
      Drop These Scripts:
      - init_dynamodb.py, create_tables.py, setup_db.py
      - Reason: "Table creation handled by SAM CloudFormation"
      
      Preserve Functionality: Only migrate what exists
      - No auth -> cognito.enabled = false
      - No database -> dynamodb_tables = []
      - No file storage -> s3_buckets = []
      
      ============================================================
      RULE 2: "GATEWAY AUTHORIZATION" - Token Validation
      ============================================================
      
      Correct Flow:
      Request -> API Gateway (Cognito Authorizer validates JWT) -> Lambda (pure business logic)
      
      Implementation:
      - API Gateway Auth.Authorizers.CognitoAuthorizer with UserPoolArn
      - Lambda accesses: event['requestContext']['authorizer']['claims']['sub']
      - User ID = Cognito Sub (UUID string)
      
      Do NOT Migrate:
      - verifyToken middleware -> Replaced by API Gateway Authorizer
      - JWT validation code -> Handled by Cognito Authorizer
      - Add to dropped_functions
      
      2. DATA ARCHITECTURE DESIGN
      
      Check analysis_report.dynamodb_info:
      - IF dynamodb_info.used == false -> Set dynamodb_tables = []
      - IF dynamodb_info.used == true:
        CRITICAL: Use ReadFileTool to read the source files listed in
        analysis_report.dynamodb_info.schema_files. Extract the EXACT table schema:
        partition key name/type, sort key name/type (if any), and GSIs (if any).
        Put this structure directly into blueprint.json dynamodb_tables (see OUTPUT section).
        Then apply the migration strategy below.

      Users Table Decision (three cases):
      a) Only credentials (password/hash/salt/tokens) → DELETE entire table (Cognito replaces it)
      b) Also has business profile data (avatar, preferences, address) → split:
         credentials → Cognito; business fields → DynamoDB UserProfiles table
      c) Only name/email/phone beyond credentials → use Cognito standard attributes, no UserProfiles
      - Do NOT migrate any user credential fields (email as login, password, tokens) to DynamoDB
      - Business tables that previously referenced integer user_id -> use Cognito Sub (UUID string) as foreign key

      Business Tables (Orders, Products, etc.):
      - Migrate all to DynamoDB
      - Foreign Key Type Change:
        * Old: user_id -> INTEGER or String(username)
        * New: userId -> String (Cognito Sub UUID)
        * Lambda source: event['requestContext']['authorizer']['claims']['sub']
      - Add GSI with userId if queries by user needed

      CRITICAL: For each table, use ReadFileTool to read the schema source files and extract
      the EXACT schema - write it directly into dynamodb_tables in blueprint.json.
      - partition_key: name and type (S/N/B)
      - sort_key: name and type (optional, omit if none)
      - gsi: list of GSIs with index_name and partition_key (optional, [] if none)
      
      File Storage:
      IF analysis_report.features contains "FileUpload" or "FileStorage":
      - Add S3 bucket to s3_buckets list
      - ELSE: Set s3_buckets = []
      
      3. AUTHENTICATION ARCHITECTURE DESIGN
      
      Check analysis_report.features:
      - IF "Auth" tag is NOT present -> Set cognito = {enabled: false}
      - IF "Auth" tag is present:
        * enabled: true
        * user_pool_attributes: ["email", "name"] (extract from user model)
        * password_policy: Define requirements (min_length, symbols, numbers, etc.)
        * Do NOT create post_confirmation triggers or any Cognito-triggered Lambda functions
      
      4. API GATEWAY CONFIGURATION
      
      API Gateway Configuration:
      - type: "REST" (use REST API for standard HTTP endpoints)
      - cors: {allow_origins: ["*"], allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]}
      
      Authorizer Configuration (CRITICAL for Gateway Authorization):
      - IF cognito.enabled == true:
        * authorizer: "Cognito"
        * authorizer_type: "COGNITO_USER_POOLS"
        * user_pool_arn: Reference to Cognito User Pool
        * token_validation: "Automatic at API Gateway layer"
        * identity_source: "Authorization header (Bearer token)"
      - ELSE:
        * authorizer: "None"
      
      Security Flow:
      1. Client includes JWT in Authorization header: "Bearer eyJhbGc..."
      2. API Gateway validates JWT signature using Cognito public keys
      3. If valid -> API Gateway passes user claims to Lambda via event.requestContext
      4. If invalid -> API Gateway returns 401 Unauthorized (Lambda never invoked)
      5. Lambda receives pre-validated user_id via event['requestContext']['authorizer']['claims']['sub']
      
      Result: Zero authentication code in Lambda functions
      
      ============================================================
      OUTPUT BLUEPRINT STRUCTURE (Write ONCE to storage/blueprint.json)
      ============================================================
      
      Generate complete blueprint.json with these sections:
      
      1. metadata:
         - application_name: Extract from analysis_report
         - architecture_pattern: "Basic Serverless Architecture" or "Event-Driven Serverless Architecture"
           (use Event-Driven if sqs_queues or eventbridge_rules are non-empty)
         - has_authentication: true/false (based on features)
         - has_database: true/false (based on dynamodb_info.used)
         - has_file_storage: true/false (based on features)
         - has_async_flows: true/false (true if sqs_queues or eventbridge_rules are non-empty)
      
      2. lambda_functions: Array of Lambda definitions
         Note (STRICT): ONE API endpoint (method+path) = ONE Lambda.
               - Do NOT group multiple endpoints into one Lambda (no internal routing).
               - You MAY organize folders/names by domain (inferred from monolith structure), but handlers stay split.
         CRITICAL: Derive source_files from entry_point_dependencies:
               - Start with the entry_point's handler file
               - Add files corresponding to callee_modules in its cross_file_calls
               - This ensures Code Developer gets the complete, precise file list
         
         trigger_type values: "api" | "internal" | "sqs" | "eventbridge"
           - "api": HTTP endpoint, triggered by API Gateway (has entry_points)
           - "internal": Called by other Lambdas via SDK invoke
           - "sqs": Triggered by SQS queue (has sqs_source, NO entry_points)
           - "eventbridge": Triggered by EventBridge rule (has event_pattern, NO entry_points)
         
         API Lambda example:
         [
           {
             "name": "items-get-item",
             "trigger_type": "api",
             "runtime": "python3.11",
             "handler": "handler.lambda_handler",
             "source_files": ["app/routes/items.py", "app/services/item_service.py"],
             "entry_points": ["GET /items/{id}"],
             "environment_variables": {
               "ITEMS_TABLE": "${ItemsTable}"
             }
           }
         ]
         
         API Lambda with async publishing:
           {
             "name": "order-checkout",
             "trigger_type": "api",
             "entry_points": ["POST /orders/checkout"],
             "publishes_to": [
               {"type": "sqs", "target": "BestsellerUpdateQueue"},
               {"type": "eventbridge", "source": "app.orders", "detail_type": "OrderCompleted"}
             ],
             "environment_variables": {
               "ORDERS_TABLE": "${OrdersTable}",
               "BESTSELLER_QUEUE_URL": "${BestsellerUpdateQueue}"
             }
           }
         
         SQS consumer Lambda:
           {
             "name": "update-bestsellers",
             "trigger_type": "sqs",
             "sqs_source": "BestsellerUpdateQueue",
             "source_files": ["utils/bestsellers.js"]
           }
         
         EventBridge consumer Lambda:
           {
             "name": "process-loyalty",
             "trigger_type": "eventbridge",
             "event_pattern": {"source": ["app.orders"], "detail-type": ["OrderCompleted"]},
             "source_files": ["services/loyalty.py"]
           }
      
      3. dynamodb_tables: Array of table definitions (empty if no database)
         CRITICAL: Include EXACT schema extracted from source files - no schema_source_files field.
         Attribute types: "S" (String), "N" (Number), "B" (Binary).
         sort_key and gsi are optional; omit if not present in the monolith.
         [
           {
             "logical_name": "Items",
             "purpose": "Store application items/resources",
             "partition_key": {"name": "id", "type": "S"},
             "sort_key": {"name": "createdAt", "type": "S"},
             "gsi": [
               {
                 "index_name": "userId-index",
                 "partition_key": {"name": "userId", "type": "S"}
               }
             ]
           }
         ]
      
      4. s3_buckets: Array of S3 bucket definitions (empty if no file storage)
         [
           {
             "logical_name": "FileStorageBucket",
             "purpose": "Store user-uploaded files and generated documents"
           }
         ]
      
      5. cognito: Cognito configuration (empty if no auth)
         {
           "enabled": true/false,
           "user_pool_attributes": ["email", "name"],
           "password_policy": {...}
         }
       
      
      6. api_gateway: API Gateway configuration
         {
           "type": "REST",
           "cors": {...},
           "authorizer": "Cognito" or "None"
         }
      
      7. lambda_invoke_permissions: Cross-Lambda SYNCHRONOUS invocation map
         Only for mechanism A (synchronous invoke where caller needs return value).
         [
           {"invoker": "booking-create", "target": "payments-charge"}
         ]
         Set to [] if no synchronous Lambda-to-Lambda calls exist.
      
      8. sqs_queues: Array of SQS queue definitions (empty if no async point-to-point patterns)
         [
           {
             "logical_name": "BestsellerUpdateQueue",
             "purpose": "Async bestseller counter updates after checkout",
             "dlq": true,
             "visibility_timeout": 60,
             "max_receive_count": 3
           }
         ]
         Set to [] if no SQS patterns identified.
      
      9. eventbridge_rules: Array of EventBridge rule definitions (empty if no fan-out patterns)
         [
           {
             "name": "OrderCompletedRule",
             "source": "app.orders",
             "detail_type": "OrderCompleted",
             "targets": ["process-loyalty", "send-notification"],
             "description": "Fan-out: order completion triggers loyalty and notification"
           }
         ]
         Set to [] if no EventBridge patterns identified.
      
      10. dropped_functions: List of dropped items
         [
           {
             "item": "POST /register",
             "type": "endpoint",
             "reason": "Replaced by Cognito User Pool registration"
           },
           {
             "item": "POST /login",
             "type": "endpoint",
             "reason": "Replaced by Cognito User Pool authentication"
           },
           {
             "item": "POST /logout",
             "type": "endpoint",
             "reason": "Replaced by Cognito User Pool sign-out"
           },
           {
             "item": "GET /me",
             "type": "endpoint",
             "reason": "Replaced by Cognito - client reads user info directly from token"
           },
           {
             "item": "verifyToken middleware / auth decorators",
             "type": "code",
             "reason": "Replaced by API Gateway Cognito Authorizer - token validation at gateway layer"
           },
           {
             "item": "init_dynamodb.py",
             "type": "script",
             "reason": "Infrastructure script - table creation handled by SAM template CloudFormation resources"
           },
           {
             "item": "Users table",
             "type": "table",
             "reason": "User authentication moved to Cognito User Pool - entire users table deleted"
           }
         ]
      
      ============================================================
      CRITICAL VALIDATION CHECKLIST
      ============================================================
      
      Before finalizing blueprint, verify "Infrastructure over Code" principles:
      
      - lambda_invoke_permissions is present: every synchronous invoker->target pair is listed; set [] if none
      - sqs_queues is present: set [] if no async point-to-point patterns
      - eventbridge_rules is present: set [] if no fan-out patterns
      - Every invoker Lambda has the target FunctionName / QueueUrl / EventBusName in its environment_variables
      - Every SQS consumer Lambda has trigger_type="sqs" and sqs_source
      - Every EventBridge consumer Lambda has trigger_type="eventbridge" and event_pattern
      - All entry_points are accounted for (either in Lambda or dropped_functions)
      - Auth endpoints (/register, /login, /logout, /refresh-token, /reset-password, /me) are DROPPED (not migrated to Lambda)
      - Users table is handled per decision rule (delete if only credentials; split if has business profile data)
      - No post_confirmation trigger or Cognito-triggered Lambda in blueprint
      - Auth middleware/decorators are DROPPED (token validation at API Gateway, not Lambda)
      - Infrastructure scripts are dropped with proper reason
      - API Gateway authorizer is "Cognito" (if auth exists), not "None"
      - Business tables foreign keys reference Cognito Sub (String UUID), not integer user_id
      - If monolith has no auth -> cognito.enabled = false
      - If monolith has no database -> dynamodb_tables = []
      - If monolith has no file storage -> s3_buckets = []
      - Each dynamodb_tables entry contains partition_key (plus sort_key/gsi if applicable) extracted from source files
      
      Three-Layer Check:
      1. Infrastructure Layer: Cognito User Pool replaces Users table (credentials)
      2. Code Layer: Auth endpoints deleted, frontend calls Cognito SDK directly
      3. Data Association Layer: Business data uses Cognito Sub, not integer user_id
      
      Focus on correctness and completeness. The blueprint must enable SAM Engineer
      to generate working infrastructure.
    expected_output: |
      A complete blueprint.json at storage/blueprint.json with all sections populated:
      metadata, lambda_functions, lambda_invoke_permissions, sqs_queues,
      eventbridge_rules, dynamodb_tables, s3_buckets, cognito, api_gateway,
      dropped_functions.
      
      Must preserve all monolith functionality and follow architecture principles.

  - id: generate_complete_application
    agent: code_developer
    description: |
      Based on storage/blueprint.json, generate a COMPLETE serverless application.

      Your mission: Generate a COMPLETE serverless application ready for deployment.
      
      ============================================================
      PHASE 1: LAMBDA FUNCTIONS
      ============================================================
      For EACH Lambda in blueprint.lambda_functions:
      
      Step 1.1: Source Code Collection
      Primary path: the Blueprint lists source_files for each Lambda — these are the
      files identified by static analysis as directly relevant.
      1. Always start by using ReadFileTool to read the raw content of every file in
         source_files. This is your primary and most reliable source of truth.
      2. You MAY autonomously invoke CodeRAGTool at any point during code transformation
         when you need additional context that ReadFileTool alone cannot provide, such as:
         - A helper function or utility called by the source files whose definition is not
           in source_files (e.g., "find the definition of validate_booking_date").
         - A dependency whose implementation lives in a file not listed in source_files.
         - Understanding how a pattern is used elsewhere in the codebase to clarify intent
           (e.g., "how is the payment module called in other route handlers").
         When CodeRAGTool returns promising results, use ReadFileTool to read the full
         file for complete context — do not rely on the RAG snippet alone.
      3. If after reading source_files and querying CodeRAGTool you still lack context,
         use ReadFileTool to read additional files directly (e.g., files referenced
         in imports or called by the source code).
      
      Step 1.2: Transform to Lambda Handler
      Create: output/lambdas/{domain}/{lambda_name}/handler.py (or .js)
      - {domain} is chosen by reasoning from the monolith’s code structure and route organization (do not use a rigid parsing rule).
      - You MAY use output/lambdas/{lambda_name}/handler.py if the monolith has no clear domains, but prefer domain folders when sensible.
      - Example (domainful): output/lambdas/orders/orders-get-order/handler.py
      - Example (flat): output/lambdas/get-item/handler.py
      
      CRITICAL: REFACTOR MINDSET
      Before writing the handler, analyze the responsibility:
      - Is this a "Worker" (does DB operations directly)? -> Implement business logic locally.
      - Is this an "Orchestrator" (coordinates other steps)? -> Use the Orchestration Rules below.
      
      Key transformations:
      - Flask/Express routes -> lambda_handler(event, context)
      - STRICT: Each Lambda implements ONLY ONE endpoint (method+path) from entry_points
      - Do NOT implement multiple routes inside one handler (no if/else routing)
      - Extract parameters from event['pathParameters'] / event['queryStringParameters']
      - Extract body from json.loads(event['body'])
      - Replace database calls: SQLite/MySQL -> boto3 DynamoDB client
      - Remove global state (use environment variables)
      
      CRITICAL: ORCHESTRATION LOGIC RULES
      If a Lambda function's primary role is to coordinate a workflow (e.g., create_booking calling flight/payment services):
      
      1. PURE ORCHESTRATION: 
         - It must ONLY invoke other Lambdas via SDK invoke, SQS send_message, or EventBridge put_events.
         - It must NOT contain local business logic implementation (e.g., do not write reserve_flight() locally).
         - It must NOT access the database directly for steps handled by other Lambdas.
         
      2. NO ZOMBIE CODE:
         - Do NOT copy helper functions from the monolith if they are replaced by external Lambda calls.
         - If you invoke `invoke_lambda(..., 'reserve_flight')`, DELETE the local `reserve_flight` function definition.
      
      3. ERROR HANDLING:
         - Handle errors from the invoked Lambda payload, not local try/except on DB logic.

      User Identity Standard Pattern:
      ```python
      def lambda_handler(event, context):
          # Get user_id from pre-validated Cognito claims
          user_id = event['requestContext']['authorizer']['claims']['sub']  # UUID
          
          # If user profile needed, query UserProfiles
          if need_profile:
              profile = profiles_table.get_item(Key={'userId': user_id})
          
          # Business logic with UUID user_id
          return process_logic(user_id, event['body'])
      ```
      
      - All userId fields: String type (Cognito Sub UUID)
      - Add proper error handling and logging
      
      Step 1.3: Shared Layer (decide ONCE before writing any handler)
      
      Before writing any handler, scan ALL lambda source_files for repeated code.
      
      Create output/layers/shared/ IF:
      - The same utility function is used by 3+ Lambda handlers, OR
      - A heavy 3rd-party dependency is shared by multiple Lambdas.
      
      Layer structure:
      - Python: output/layers/shared/python/shared_utils.py
                 output/layers/shared/requirements.txt  (layer-specific deps only)
      - Node.js: output/layers/shared/nodejs/node_modules/shared/index.js
                 output/layers/shared/package.json
      
      What to include:
      Shared helper functions (response formatters, validators, DynamoDB helpers)
      Heavy 3rd-party deps shared by 3+ Lambdas
      Business logic specific to one endpoint
      AWS SDK itself (already in Lambda runtime)
      
      In each Lambda handler that uses the layer:
      - Python:  from shared_utils import format_response
      - Node.js: const { formatResponse } = require('/opt/nodejs/shared');
      
      If no shared code is needed, skip this step entirely (do NOT create empty layer dirs).
      
      Step 1.4: Cross-Lambda Communication Code
      
      There are THREE communication mechanisms. Use the one matching the blueprint:
      
        A) SYNCHRONOUS INVOKE (for entries in blueprint.lambda_invoke_permissions):
        Caller NEEDS the callee's return value for its own HTTP response.
        ```python
        import boto3, json, os
        lambda_client = boto3.client('lambda')
        response = lambda_client.invoke(
            FunctionName=os.environ['PROCESS_PAYMENT_FUNCTION_NAME'],
            InvocationType='RequestResponse',
            Payload=json.dumps({'chargeId': charge_id})
        )
        result = json.loads(response['Payload'].read())
        ```
      
        B) SQS PUBLISH (for API Lambdas with publishes_to type="sqs"):
        Fire-and-forget: caller does NOT need result. Queue URL from env var.
        ```python
        import boto3, json, os
        sqs = boto3.client('sqs')
        sqs.send_message(
            QueueUrl=os.environ['BESTSELLER_QUEUE_URL'],
            MessageBody=json.dumps({'orderId': order_id, 'books': purchased_books})
        )
        ```
      
        C) EVENTBRIDGE PUBLISH (for API Lambdas with publishes_to type="eventbridge"):
        Event notification: one or more consumers react independently.
        ```python
        import boto3, json
        events = boto3.client('events')
        events.put_events(Entries=[{
            'Source': 'app.orders',
            'DetailType': 'OrderCompleted',
            'Detail': json.dumps({'orderId': order_id, 'userId': user_id})
        }])
        ```
      
      - Do NOT use HTTP fetch/axios/requests to call another Lambda via API Gateway URL.
      - Do NOT use lambda.invoke(InvocationType='Event') — use SQS or EventBridge for async.
      - The SAM engineer will add the required IAM policies based on the blueprint.
      
      Step 1.5: Dependencies & Configuration
      - REFERENCE analysis_report.json (specifically dependency_graph) and scan source code import/require statements to determine dependencies.
      - Do NOT include dependencies already provided by the shared layer (if created).
      - For Python Lambdas:
        - Create output/lambdas/{lambda_name}/requirements.txt.
        - boto3 is pre-installed in Lambda Python runtimes; only include it if you need to pin a specific version. Include any 3rd-party libraries from the monolith's requirements that are used by this function.
      - For Node.js Lambdas:
        - Create output/lambdas/{lambda_name}/package.json.
        - DO NOT create requirements.txt.
        - AWS SDK Rule: Use AWS SDK v3 (@aws-sdk/* modular packages). DO NOT use v2 (aws-sdk) — it reached end-of-support on September 8, 2025.
        - Only include the specific @aws-sdk/* client packages used (e.g. @aws-sdk/client-dynamodb, @aws-sdk/lib-dynamodb, @aws-sdk/client-s3).
        - Use ES module syntax (import/export) with handler.mjs.
        - Ensure package.json includes all import dependencies.
        - Ensure engines field in package.json matches the target Node.js runtime.
      
      

      ============================================================
      PHASE 2: DEPLOYMENT GUIDE
      ============================================================
      Create: output/README.md
      Include: 
      - Project structure overview
      - Prerequisites (AWS CLI, SAM CLI, runtime versions)
      - Quick start: sam build && sam deploy --guided
      - Deployment steps and configuration
      - Environment variables guide
      - API endpoint documentation
      - Testing instructions with sample curl/API requests
      - Note: Mention dropped endpoints (auth endpoints handled by Cognito)
      
      ============================================================
      CRITICAL RULES
      ============================================================
      1. PRESERVE ALL BUSINESS LOGIC - do not simplify or skip
      2. GENERATE COMPLETE FILES - not snippets
      3. MAINTAIN DIRECTORY STRUCTURE as shown above
      4. ENSURE CONSISTENCY - all references between files must work
      5. USE ENVIRONMENT VARIABLES - no hardcoded values
      6. For SQS-triggered Lambdas (trigger_type="sqs" in blueprint):
         - Handler receives event['Records'], iterate and parse record['body']
         - No API Gateway response format needed (no statusCode/headers/body wrapper)
         - Use batch item failure reporting for partial failures
      7. For EventBridge-triggered Lambdas (trigger_type="eventbridge" in blueprint):
         - Handler receives event['detail'] directly
         - No API Gateway response format needed
      8. For API Lambdas with publishes_to in blueprint:
         - Replace direct function calls with SQS send_message or EventBridge put_events
         - Return HTTP response BEFORE async processing (the message/event IS the handoff)
         - Queue URL / Event Bus name from environment variables (os.environ[...])
      9. DO NOT generate Step Functions, SNS handlers, or any services not in the blueprint
      
      CRITICAL: YOU ARE A CODE DEVELOPER, NOT AN INFRASTRUCTURE ENGINEER!
      
      YOUR RESPONSIBILITY:
      Generate Lambda function code (handler.py, handler.js)
      Generate dependency files (requirements.txt, package.json)
      Generate README.md documentation
      
      NOT YOUR RESPONSIBILITY (DO NOT GENERATE):
      template.yaml (SAM template) - This is sam_engineer's job!
      template.yml
      serverless.yml
      cloudformation.yaml
      samconfig.toml
      Any AWS CloudFormation or SAM infrastructure-as-code files
      
      The next agent (sam_engineer) will analyze your generated code and create all infrastructure files.
      Focus ONLY on application code, NOT infrastructure definitions!
    expected_output: |
      Complete application code in output/ directory:
      - Lambda handlers and dependencies
      - README.md with deployment and frontend integration guide
      
      NO infrastructure files (template.yaml) - sam_engineer creates those!

  # ============================================================
  # SAM Template Generation - Split into 3 micro-tasks to avoid
  # context window overflow. Each task reads only what it needs
  # and communicates with the next task via small temp files on disk.
  # context=[] is enforced in main.py for all three task IDs.
  # ============================================================

  - id: generate_shared_resources_template
    agent: sam_engineer
    description: |
      MISSION: Read storage/blueprint.json ONLY and generate the shared infrastructure
      resources (DynamoDB tables, Cognito, S3, API Gateway header, SharedUtilsLayer
      declaration). Write results to output/temp_shared_resources.yaml.

      This task does NOT touch output/lambdas/ at all. Lambda functions are handled
      in the next task. Your only input is blueprint.json.

      ============================================================
      STEP 1: READ BLUEPRINT
      ============================================================

      Read storage/blueprint.json and extract:
        * metadata.runtime             (e.g. python3.11)
        * metadata.has_authentication  (bool)
        * metadata.has_database        (bool)
        * metadata.has_file_storage    (bool)
        * metadata.has_async_flows     (bool)
        * dynamodb_tables[]            (partition_key, sort_key, gsi)
        * sqs_queues[]                 (logical_name, dlq, visibility_timeout, max_receive_count)
        * eventbridge_rules[]          (name, source, detail_type, targets)
        * s3_buckets[]
        * cognito                      (enabled, userPoolName, etc.)
        * api_gateway                  (cors, authorizer)
        * lambda_invoke_permissions[]  (save this list for the next task)

      Also check if output/layers/shared/ exists on disk using FileListTool.
      If it exists, record the runtime from output/layers/shared/python/ or
      output/layers/shared/nodejs/.

      ============================================================
      STEP 2: WRITE output/temp_shared_resources.yaml
      ============================================================

      Write a YAML file with the following sections IN ORDER. This is NOT a
      deployable SAM template yet — it is a partial fragment that will be
      assembled in the final task.

      Section A — Template header and Globals:
        ```yaml
        AWSTemplateFormatVersion: '2010-09-09'
        Transform: AWS::Serverless-2016-10-31
        Description: Serverless application (auto-generated)

        Globals:
          Function:
            Runtime: <runtime from blueprint>
            Timeout: 30
            MemorySize: 256
            Tracing: Active
            Environment:
              Variables:
                ENVIRONMENT: !Ref Environment

        Parameters:
          Environment:
            Type: String
            Default: dev
            AllowedValues: [dev, staging, prod]
        ```

      Section B — API Gateway (always include):
        - If cognito.enabled == true: configure CognitoAuthorizer
        - If cognito.enabled == false: no authorizer

      Section C — Cognito (only if cognito.enabled == true):
        - AWS::Cognito::UserPool
        - AWS::Cognito::UserPoolClient
        - Do NOT set LambdaConfig on UserPool (circular dependency)

      Section D — DynamoDB Tables (only if has_database == true):
        - One AWS::DynamoDB::Table per entry in blueprint.dynamodb_tables
        - Use blueprint schema directly (partition_key, sort_key, gsi)
        - userId AttributeType is always S (Cognito Sub UUID)

      Section E — S3 Buckets (only if has_file_storage == true):
        - One AWS::S3::Bucket per entry in blueprint.s3_buckets

      Section F — SharedUtilsLayer (only if output/layers/shared/ exists on disk):
        ```yaml
        SharedUtilsLayer:
          Type: AWS::Serverless::LayerVersion
          Properties:
            LayerName: !Sub '${AWS::StackName}-shared-utils'
            ContentUri: layers/shared/
            CompatibleRuntimes:
              - <runtime detected from disk>
            RetentionPolicy: Delete
          Metadata:
            BuildMethod: <runtime detected from disk>
        ```
        If output/layers/shared/ does NOT exist -> skip this section entirely.

      Section H — SQS Queues (only if blueprint.sqs_queues is non-empty):
        For each entry in blueprint.sqs_queues:
        - One AWS::SQS::Queue with VisibilityTimeout from blueprint
        - One DLQ (AWS::SQS::Queue) if dlq=true in blueprint
        - Configure RedrivePolicy: deadLetterTargetArn + maxReceiveCount from blueprint
        ```yaml
        <LogicalName>:
          Type: AWS::SQS::Queue
          Properties:
            QueueName: !Sub '${AWS::StackName}-<kebab-name>'
            VisibilityTimeout: <from blueprint>
            RedrivePolicy:
              deadLetterTargetArn: !GetAtt <LogicalName>DLQ.Arn
              maxReceiveCount: <from blueprint>
        <LogicalName>DLQ:
          Type: AWS::SQS::Queue
          Properties:
            QueueName: !Sub '${AWS::StackName}-<kebab-name>-dlq'
        ```
        If blueprint.sqs_queues is empty -> skip this section entirely.

      Section I — EventBridge Rules (only if blueprint.eventbridge_rules is non-empty):
        For each entry in blueprint.eventbridge_rules:
        - One AWS::Events::Rule with EventPattern from blueprint (source + detail-type)
        - Do NOT add Targets or AWS::Lambda::Permission here — those reference
          Lambda functions defined in the next task. The assembly task will wire them.
        ```yaml
        <RuleName>:
          Type: AWS::Events::Rule
          Properties:
            EventPattern:
              source: ["<source>"]
              detail-type: ["<detail_type>"]
        ```
        If blueprint.eventbridge_rules is empty -> skip this section entirely.

      Section J — Metadata comment for next task:
        At the very end of the file, append a YAML comment block so the assembly
        task knows what was included:
        ```yaml
        # --- SHARED_RESOURCES_METADATA ---
        # has_authentication: <true|false>
        # has_database: <true|false>
        # has_file_storage: <true|false>
        # has_async_flows: <true|false>
        # has_shared_layer: <true|false>
        # runtime: <runtime>
        # lambda_invoke_permissions: <JSON array as inline comment>
        # cognito_user_pool_logical_name: <LogicalName or NONE>
        # dynamodb_table_logical_names: <comma-separated logical names or NONE>
        # sqs_queue_logical_names: <comma-separated logical names or NONE>
        # eventbridge_rule_names: <comma-separated rule names or NONE>
        # --- END METADATA ---
        ```

      ============================================================
      CRITICAL RULES
      ============================================================
      1. Write output/temp_shared_resources.yaml ONCE, completely.
      2. Do NOT read any file in output/lambdas/ — that is the next task's job.
      3. No hardcoded ARNs — use !Ref, !Sub, !GetAtt.
      4. If blueprint says has_database=false, write NO DynamoDB resources.
      5. Do NOT use SAMValidateTool — this file is a partial fragment, not a
         deployable SAM template. Validation happens only in the assembly task.
    expected_output: |
      output/temp_shared_resources.yaml containing:
      - SAM template header + Globals + Parameters
      - API Gateway resource (with or without Cognito authorizer)
      - Cognito resources (if applicable)
      - DynamoDB tables (if applicable)
      - S3 buckets (if applicable)
      - SharedUtilsLayer declaration (if layers/shared/ exists on disk)
      - SQS queues + DLQs (if blueprint.sqs_queues is non-empty)
      - EventBridge rules + LambdaPermissions (if blueprint.eventbridge_rules is non-empty)
      - Metadata comment block for the assembly task

  - id: generate_functions_template
    agent: sam_engineer
    description: |
      MISSION: Scan output/lambdas/ domain by domain and generate Lambda function
      resource definitions. Write results to output/temp_functions.yaml.

      IMPORTANT: Process ONE domain subdirectory at a time to keep context small.
      After writing each domain's functions, you can "forget" that domain's handler
      code — append to the file and move on.

      ============================================================
      STEP 0: READ BLUEPRINT FOR TRIGGER MAPPING
      ============================================================

      Read storage/blueprint.json and extract ONLY:
        * lambda_functions[] — for each entry, record: name, trigger_type,
          sqs_source (if trigger_type="sqs"), event_pattern (if trigger_type="eventbridge"),
          publishes_to (if present)
      This tells you WHICH Lambda is SQS/EventBridge-triggered and WHICH queue/rule
      it connects to. You CANNOT determine this from handler code alone.

      ============================================================
      STEP 1: READ METADATA FROM PREVIOUS TASK
      ============================================================

      Read output/temp_shared_resources.yaml and extract from the
      "--- SHARED_RESOURCES_METADATA ---" comment block:
        * has_shared_layer (true/false)
        * has_async_flows (true/false)
        * runtime
        * lambda_invoke_permissions (JSON array)
        * cognito_user_pool_logical_name
        * sqs_queue_logical_names (comma-separated or NONE)
        * eventbridge_rule_names (comma-separated or NONE)

      ============================================================
      STEP 2: DISCOVER ALL DOMAINS
      ============================================================

      Use FileListTool to list the IMMEDIATE subdirectories of output/lambdas/.
      These are the domain folders (e.g., bookings/, flights/, users/).
      Record them as your processing queue.

      If output/lambdas/ has no subdirectories but contains handler.py directly,
      treat the root as a single "flat" domain.

      ============================================================
      STEP 3: PROCESS EACH DOMAIN (one at a time)
      ============================================================

      For EACH domain folder in your queue:

        3a. List the immediate subdirectories inside this domain folder.
            Each subdirectory = one Lambda function.
            (e.g., output/lambdas/bookings/bookings-create/ = one Lambda)

        3b. For EACH Lambda subdirectory inside this domain:
            - Match this directory name against blueprint lambda_functions[].name
              to find its trigger_type, sqs_source, event_pattern, and publishes_to.
            - Read handler.py (or handler.js) to find:
              * handler function name (default: lambda_handler)
              * ALL os.environ[...] or os.environ.get(...) keys -> env var list
              * ALL boto3.client/resource calls -> IAM policy list:
                - boto3.client('dynamodb') or boto3.resource('dynamodb') → DynamoDBCrudPolicy
                - boto3.client('s3') → S3CrudPolicy
                - boto3.client('lambda') + .invoke() → LambdaInvokePolicy
                - boto3.client('sqs') + .send_message() → SQSSendMessagePolicy
                - boto3.client('events') + .put_events() → EventBridgePutEventsPolicy
            - Use trigger_type from blueprint (Step 0) to determine the Events block:
              * trigger_type="api" → Api Event with Path/Method
              * trigger_type="sqs" → SQS Event with Queue from sqs_source
              * trigger_type="eventbridge" → NO Events block (Rule Target handles it)
              * trigger_type="internal" → NO Events block
            - Read requirements.txt or package.json (if exists)
            - Derive the CodeUri as: lambdas/<domain>/<function-name>/

        3c. Generate the YAML block for each Lambda in this domain and APPEND
            to output/temp_functions.yaml using WriteFileTool with append=True.
            This preserves previously written domains.

      Lambda YAML format — API-triggered (trigger_type="api"):
        ```yaml
          <LogicalName>:
            Type: AWS::Serverless::Function
            Properties:
              FunctionName: !Sub '${AWS::StackName}-<kebab-name>'
              CodeUri: lambdas/<domain>/<function-dir>/
              Handler: handler.<handler_function_name>
              Layers:
                - !Ref SharedUtilsLayer   # only if has_shared_layer == true
              Policies:
                - DynamoDBCrudPolicy:     # if handler reads/writes DynamoDB
                    TableName: !Ref <TableLogicalName>
                - S3CrudPolicy:           # if handler reads/writes S3
                    BucketName: !Ref <BucketLogicalName>
                - LambdaInvokePolicy:     # if this function invokes another Lambda (sync)
                    FunctionName: !Ref <TargetFunctionLogicalName>
                - SQSSendMessagePolicy:   # if handler sends SQS messages
                    QueueName: !GetAtt <QueueLogicalName>.QueueName
                - EventBridgePutEventsPolicy:  # if handler publishes EventBridge events
                    EventBusName: default
              Environment:
                Variables:
                  ENVIRONMENT: !Ref Environment
                  TABLE_NAME: !Ref <TableLogicalName>
                  <QUEUE_URL>: !Ref <QueueLogicalName>  # if publishes to SQS
                  <OTHER_ENV_KEYS>: <value or !Ref>
              Events:
                Api:
                  Type: Api
                  Properties:
                    Path: /<path>
                    Method: <method>
                    Auth:
                      Authorizer: CognitoAuthorizer   # only if cognito enabled
        ```

      Lambda YAML format — SQS-triggered (trigger_type="sqs"):
        Use blueprint sqs_source to determine the QueueLogicalName.
        ```yaml
          <LogicalName>:
            Type: AWS::Serverless::Function
            Properties:
              FunctionName: !Sub '${AWS::StackName}-<kebab-name>'
              CodeUri: lambdas/<domain>/<function-dir>/
              Handler: handler.<handler_function_name>
              Layers:
                - !Ref SharedUtilsLayer   # only if has_shared_layer == true
              Policies:
                - SQSPollerPolicy:
                    QueueName: !GetAtt <QueueLogicalName>.QueueName
                - DynamoDBCrudPolicy:     # if handler reads/writes DynamoDB
                    TableName: !Ref <TableLogicalName>
              Environment:
                Variables:
                  ENVIRONMENT: !Ref Environment
                  <OTHER_ENV_KEYS>: <value or !Ref>
              Events:
                SQSEvent:
                  Type: SQS
                  Properties:
                    Queue: !GetAtt <QueueLogicalName>.Arn
                    BatchSize: 10
        ```
        NOTE: SQS-triggered Lambdas have NO Api Event. <QueueLogicalName> comes from
        blueprint lambda_functions[].sqs_source (e.g. "BestsellerUpdateQueue").

      Lambda YAML format — EventBridge-triggered (trigger_type="eventbridge"):
        ```yaml
          <LogicalName>:
            Type: AWS::Serverless::Function
            Properties:
              FunctionName: !Sub '${AWS::StackName}-<kebab-name>'
              CodeUri: lambdas/<domain>/<function-dir>/
              Handler: handler.<handler_function_name>
              Layers:
                - !Ref SharedUtilsLayer   # only if has_shared_layer == true
              Policies:
                - DynamoDBCrudPolicy:     # if handler reads/writes DynamoDB
                    TableName: !Ref <TableLogicalName>
              Environment:
                Variables:
                  ENVIRONMENT: !Ref Environment
                  <OTHER_ENV_KEYS>: <value or !Ref>
        ```
        NOTE: EventBridge-triggered Lambdas have NO Events block. The EventBridge Rule
        Target (defined in temp_shared_resources.yaml) handles invocation.
        Use blueprint lambda_functions[].event_pattern to verify the correct rule mapping.

      ============================================================
      STEP 4: HANDLE INTER-LAMBDA PERMISSIONS
      ============================================================

      After all domains are processed, review the lambda_invoke_permissions list
      extracted in Step 1. For each {"invoker": "A", "target": "B"} entry:
      - Ensure the invoker Lambda's YAML already has LambdaInvokePolicy for target B.
      - Ensure the invoker Lambda's Environment.Variables has
        <TARGET>_FUNCTION_NAME: !Ref <TargetLogicalName>.
      If any are missing, update the corresponding function block in
      output/temp_functions.yaml.

      ============================================================
      STEP 5: WRITE METADATA COMMENT
      ============================================================

      At the end of output/temp_functions.yaml, append (using append=True):
        ```yaml
        # --- FUNCTIONS_METADATA ---
        # total_functions: <count>
        # logical_names: <comma-separated list of all Lambda logical names>
        # --- END METADATA ---
        ```

      ============================================================
      CRITICAL RULES
      ============================================================
      1. Process domains ONE AT A TIME — do not read all handler files at once.
      2. APPEND to output/temp_functions.yaml (use append=True) after each domain; never overwrite.
      3. CodeUri must exactly match the directory path on disk.
      4. Every os.environ key found in handler code MUST appear in Environment.Variables.
      5. Do NOT include DynamoDB/S3/Cognito resource definitions — those are in temp_shared_resources.yaml.
      6. If output/lambdas/ is empty or does not exist, write an empty file with only the metadata comment.
      7. Do NOT use SAMValidateTool — this file is a partial fragment, not a
         deployable SAM template. Validation happens only in the assembly task.
    expected_output: |
      output/temp_functions.yaml containing:
      - One AWS::Serverless::Function resource per Lambda directory found on disk
      - Correct CodeUri, Handler, Policies, Environment Variables, and Events for each
      - Metadata comment block with total function count and logical names

  - id: assemble_final_template
    agent: sam_engineer
    description: |
      MISSION: Read the two small temp files generated by previous tasks and
      assemble the final output/template.yaml. Then validate it with SAMValidateTool.

      The heavy lifting (reading all handler code) was done in prior tasks.
      This task is purely assembly + validation. The two input files are small.

      ============================================================
      STEP 1: READ THE TWO TEMP FILES
      ============================================================

      Read output/temp_shared_resources.yaml
        - Contains: header, Globals, Parameters, API Gateway, Cognito, DynamoDB,
          S3, SharedUtilsLayer, EventBridge Rules (without Targets), and metadata comment.

      Read output/temp_functions.yaml
        - Contains: all Lambda function definitions and metadata comment.

      Read storage/blueprint.json and extract ONLY eventbridge_rules[]
        - Needed to wire EventBridge Rule Targets to the correct consumer Lambdas.
        - Skip this read if metadata shows has_async_flows=false.

      ============================================================
      STEP 2: ASSEMBLE output/template.yaml
      ============================================================

      Merge the two files into a single valid SAM template:

        1. Start with the header, Globals, Parameters from temp_shared_resources.yaml.
        2. Open the Resources: section.
        3. Insert ALL shared infrastructure resources (API Gateway, Cognito, DynamoDB,
           S3, SharedUtilsLayer) from temp_shared_resources.yaml.
        4. Insert ALL Lambda function resources from temp_functions.yaml.
        5. WIRE EVENTBRIDGE TARGETS (only if EventBridge Rules exist):
           For each rule in blueprint.eventbridge_rules, update the corresponding
           AWS::Events::Rule resource (from step 3) to add Targets referencing the
           consumer Lambda functions (now available from step 4):
             Targets:
               - Arn: !GetAtt <ConsumerLogicalName>.Arn
                 Id: "<ConsumerName>"
           Also add one AWS::Lambda::Permission per target:
             <ConsumerName>EventPermission:
               Type: AWS::Lambda::Permission
               Properties:
                 FunctionName: !Ref <ConsumerLogicalName>
                 Action: lambda:InvokeFunction
                 Principal: events.amazonaws.com
                 SourceArn: !GetAtt <RuleName>.Arn
        6. Close the Resources: section.
        7. Add the Outputs: section:
           - ApiEndpoint: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
           - One output per DynamoDB table (TableName + Arn)
           - UserPoolId and UserPoolClientId (if Cognito enabled)
           - SharedUtilsLayerArn (if SharedUtilsLayer present)

      Write the assembled content to output/template.yaml ONCE.

      ============================================================
      STEP 3: VALIDATE
      ============================================================

      Run SAMValidateTool with template_path="output/template.yaml".
      The tool reads the file from disk — do NOT pass file content as an argument.

      If validation errors are found:
        - Analyze the error message carefully.
        - Fix ONLY the specific resource/property that caused the error.
        - Write the fixed template to output/template.yaml using WriteFileTool.
        - Re-run SAMValidateTool with template_path="output/template.yaml".
        - Repeat until validation passes or no further fixes are possible.

      ============================================================
      STEP 4: DEPLOYMENT CONFIG (optional)
      ============================================================

      Create output/samconfig.toml with default deployment parameters:
        - stack_name, region, capabilities = ["CAPABILITY_IAM"]
        - confirm_changeset = false for automation

      ============================================================
      CRITICAL RULES
      ============================================================
      1. Do NOT re-read any handler.py files — trust the temp files.
      2. No hardcoded ARNs — use !Ref, !Sub, !GetAtt.
      3. Must pass SAMValidateTool before finalizing.
      4. Single output file: output/template.yaml.
      5. Do NOT cross-check template against output/lambdas/ directories —
         that is the next agent's (Consistency Validator) responsibility.
      6. Do NOT delete any files — you have no delete tool. Temp files will
         be cleaned up manually.
      7. ANTI-LOOP: Once SAMValidateTool returns "Validation Successful",
         the template is CORRECT. Do NOT re-read template.yaml to "include
         in the final answer" or to "double check". Proceed immediately to
         writing samconfig.toml (Step 4) and then return your Final Answer.
         You MUST NOT read template.yaml more than 3 times total in this task.
    expected_output: |
      Validated SAM template in output/ directory:
      - output/template.yaml (complete: header, Lambdas, API Gateway, DynamoDB,
        Cognito, S3, SharedUtilsLayer if applicable, Outputs)
      - output/samconfig.toml (optional)

      Ready for deployment with 'sam build && sam deploy --guided'.

  # ============================================================
  # Consistency Validation — closes the pipeline loop by
  # cross-checking Lambda code against SAM template.
  # Runs AFTER all SAM Engineer tasks are complete.
  # context=[] is enforced in main.py for this task ID.
  # ============================================================

  - id: validate_consistency
    agent: consistency_validator
    description: |
      MISSION: Systematically cross-check the generated Lambda code (output/lambdas/)
      against the SAM template (output/template.yaml) and the architecture blueprint
      (storage/blueprint.json). Fix any mismatches found, then re-validate.

      This is the FINAL quality gate before the application is considered deployable.

      EXECUTION MODEL: Steps 1→2→3→4→5 are strictly sequential.
      Do NOT return to a previous step after completing it.

      ============================================================
      STEP 1: INVENTORY — Build the ground truth from disk
      ============================================================

      1a. Use FileListTool to list ALL subdirectories under output/lambdas/ (recursively).
          Build a map of every Lambda function directory on disk:
            { "lambdas/orders/orders-get-order/": "handler.py" }
          Record the handler file name (handler.py or handler.js) for each.

      1b. Read output/template.yaml ONCE and extract ALL AWS::Serverless::Function
          resources. For each, record: LogicalName, CodeUri, Handler,
          Environment.Variables, Policies, Layers, and Events (Api Path + Method).

      1c. Read storage/blueprint.json ONCE and extract lambda_functions (as a
          reference for expected endpoints), lambda_invoke_permissions,
          sqs_queues, and eventbridge_rules.

      1d. Check if output/layers/shared/ exists on disk using FileListTool.

      ============================================================
      STEP 2: CHECK — Run 9 consistency checks in 4 phases
      ============================================================

      Record every mismatch as a finding with:
        - check_id (e.g., "C1")
        - severity ("ERROR" or "WARNING")
        - description (human-readable)
        - affected_resource (LogicalName or directory)
        - suggested_fix

      --- Phase A: Structural checks (no handler reading needed) ---

      CHECK C1 — Directory ↔ Function Coverage (bidirectional)
        - For every Lambda directory on disk: verify a matching Function exists in
          template.yaml whose CodeUri points to that directory.
        - For every Function in template.yaml: verify its CodeUri directory exists
          on disk.
        - Severity: ERROR

      CHECK C2 — CodeUri Accuracy
        - For each Function, verify CodeUri ends with "/" and matches an actual
          disk path.
        - Severity: ERROR

      --- Phase B: Handler-level checks (read each handler ONCE) ---

      IMPORTANT: For EACH Lambda function, read its handler file exactly ONCE,
      then perform ALL four checks (C3, C4, C5, C6) on the content you just read
      before moving to the next Lambda. Do NOT re-read the same handler file.

      CHECK C3 — Handler Validity
        - Parse the Handler value (e.g., "handler.lambda_handler").
        - Verify the function name exists in the handler file content.
        - Python: look for "def lambda_handler(" or the specified function name.
        - Node.js: look for "exports.handler" / "module.exports.handler".
        - Severity: ERROR

      CHECK C4 — Environment Variable Completeness
        - Extract ALL os.environ / os.environ.get / os.getenv keys (Python)
          or process.env.KEY references (Node.js) from the handler content.
        - Compare against the Function's Environment.Variables in template.yaml.
        - Key used in code but missing from template → ERROR.
        - Key in template but not used in code → WARNING.

      CHECK C5 — IAM Policy Alignment
        - From the handler content, check:
          * boto3.resource('dynamodb') or boto3.client('dynamodb') →
            must have DynamoDBCrudPolicy
          * boto3.client('s3') → must have S3CrudPolicy
          * boto3.client('lambda').invoke() → must have LambdaInvokePolicy
          * boto3.client('sqs').send_message() → must have SQSSendMessagePolicy
          * boto3.client('events').put_events() → must have EventBridgePutEventsPolicy
        - Severity: ERROR

      CHECK C6 — Layer Consistency
        - From the handler content, check if it imports from the shared layer
          (e.g., "from shared_utils import" or "require('/opt/nodejs/shared')").
        - If yes → Function must have "!Ref SharedUtilsLayer" in Layers.
        - If output/layers/shared/ does NOT exist on disk →
          template.yaml must NOT reference SharedUtilsLayer.
        - Severity: ERROR

      --- Phase C: Blueprint matching (no handler reading needed) ---

      CHECK C7 — API Event Matching
        - For each Function with an Api Event, compare (Path, Method) against the
          corresponding entry in blueprint.json lambda_functions[].entry_points.
        - Every blueprint entry_point should be covered by exactly one Function's
          Api Event.
        - Severity: ERROR

      --- Phase D: Async resource checks (only if blueprint has async flows) ---

      CHECK C8 — SQS Resource Consistency
        - For each sqs_queues entry in blueprint:
            verify AWS::SQS::Queue exists in template.yaml
        - For each Lambda with publishes_to containing SQS (in blueprint):
            verify SQSSendMessagePolicy AND QUEUE_URL environment variable
            exist in the Function's template definition
        - For each Lambda with trigger_type="sqs" (in blueprint):
            verify SQS Event source mapping exists in the Function's template
        - Severity: ERROR

      CHECK C9 — EventBridge Resource Consistency
        - For each eventbridge_rules entry in blueprint:
            verify AWS::Events::Rule exists in template.yaml
        - For each rule target:
            verify AWS::Lambda::Permission for EventBridge invocation exists
        - For each Lambda with trigger_type="eventbridge" (in blueprint):
            verify it appears as a Target in at least one EventBridge Rule
        - For each Lambda with publishes_to containing EventBridge (in blueprint):
            verify EventBridgePutEventsPolicy exists in the Function's template
        - Severity: ERROR

      ============================================================
      STEP 3: FIX — Resolve all ERROR-level findings (one pass)
      ============================================================

      Collect ALL ERROR findings from Step 2 and apply fixes in a single batch:

      - C1 (missing Function): Add a new AWS::Serverless::Function block to
        template.yaml. You already read the handler in Phase B — use that info.
      - C1 (orphan Function): Remove the Function block from template.yaml.
      - C2 (bad CodeUri): Correct the CodeUri to match the actual directory path.
      - C3 (bad Handler): Fix the Handler property in template.yaml.
      - C4 (missing env var): Add the missing key to Environment.Variables.
      - C5 (missing policy): Add the required SAM policy to Policies list.
      - C6 (layer mismatch): Add or remove SharedUtilsLayer references.
      - C7 (route mismatch): Fix the Api Event Path/Method in template.yaml.
      - C8 (SQS mismatch): Add missing SQS queue, SQSSendMessagePolicy, QUEUE_URL
        env var, or SQS Event source mapping to template.yaml.
      - C9 (EventBridge mismatch): Add missing EventBridge rule, LambdaPermission,
        EventBridgePutEventsPolicy, or rule target to template.yaml.

      After applying ALL fixes, write the updated template.yaml ONCE.
      If there are zero ERROR findings, skip this step entirely.

      ============================================================
      STEP 4: RE-VALIDATE
      ============================================================

      Run SAMValidateTool with template_path="output/template.yaml".
      If validation fails, fix the specific error, write the updated template, and
      re-validate (up to 3 retries).
      After validation passes (or after 3 retries), proceed to Step 5 regardless.

      ============================================================
      STEP 5: GENERATE REPORT
      ============================================================

      Write a validation report to output/consistency_report.json with:
      ```json
      {
        "status": "PASS" or "FAIL",
        "total_checks": 9,
        "findings": [
          {
            "check_id": "C1",
            "severity": "ERROR",
            "description": "...",
            "affected_resource": "...",
            "action_taken": "FIXED" or "UNABLE_TO_FIX"
          }
        ],
        "fixes_applied": <count>,
        "sam_validation": "PASS" or "FAIL",
        "summary": "All 9 checks passed after applying N fixes."
      }
      ```

      ============================================================
      CRITICAL RULES
      ============================================================
      1. Read files from disk — do NOT rely on previous task context.
      2. Fix template.yaml for infrastructure mismatches; fix handler code ONLY
         when the handler itself is clearly wrong (e.g., wrong function name).
      3. Write consistency_report.json even if all checks pass (status="PASS").
      4. STRICT SEQUENTIAL EXECUTION: Steps 1→2→3→4→5 in order. Do NOT go
         back to re-run checks after fixing. Checks run ONCE, fixes run ONCE.
      5. READ LIMITS: template.yaml at most 2 reads total (Step 1 + Step 3 fix).
         Each handler file at most 1 read (Phase B). blueprint.json at most 1 read.
      6. ANTI-LOOP: Once SAMValidateTool returns "Validation Successful", proceed
         immediately to Step 5. Do NOT re-read template.yaml to "include in the
         final answer". Your Final Answer should be the consistency_report.json
         content, not the template content.
    expected_output: |
      Consistency validation completed:
      - All 9 cross-checks executed between output/lambdas/ and output/template.yaml
      - All ERROR-level mismatches fixed
      - output/template.yaml re-validated with SAMValidateTool
      - output/consistency_report.json generated with full findings and fix details