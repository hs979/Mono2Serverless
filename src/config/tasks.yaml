      Validated SAM templates in output/ directory:
      - template.yaml (Lambdas, API Gateway, DynamoDB, S3, CloudWatch, Outputs)
      - cognito.yaml (if auth enabled)
      - samconfig.toml (optional)
      
      Ready for deployment with 'sam build && sam deploy'.
