AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Shopping cart serverless application infrastructure

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
    Tracing: Active
  Api:
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Cart-ID'"
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # Cognito User Pool
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${Environment}-shopping-cart-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  # Cognito User Pool Client
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${Environment}-shopping-cart-client
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false
      SupportedIdentityProviders:
        - COGNITO

  # DynamoDB Table
  ShoppingCartTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-shopping-cart-table
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: username-index
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  # API Gateway
  ShoppingCartApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  # Lambda Functions
  ProductGetAllFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/products/product-get-all/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /product
            Method: GET

  ProductGetByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/products/product-get-by-id/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /product/{product_id}
            Method: GET

  CartListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/cart/cart-list/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart
            Method: GET

  CartAddFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/cart/cart-add/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart
            Method: POST

  CartUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/cart/cart-update/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/{product_id}
            Method: PUT

  CartMigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/cart/cart-migrate/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/migrate
            Method: POST

  CartCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/cart/cart-checkout/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/checkout
            Method: POST

  CartGetTotalFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/cart/cart-get-total/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/{product_id}/total
            Method: GET

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ShoppingCartApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  ShoppingCartTableName:
    Description: "DynamoDB Table Name"
    Value: !Ref ShoppingCartTable
    Export:
      Name: !Sub ${AWS::StackName}-ShoppingCartTableName