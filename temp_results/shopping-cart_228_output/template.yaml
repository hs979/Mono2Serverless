AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Shopping Cart Serverless Application

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
    Tracing: Active
  Api:
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type,Authorization,X-Cart-ID'"
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      MaxAge: "'3600'"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # Lambda Layer
  BasePythonUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Metadata:
      BuildMethod: python3.11
    Properties:
      LayerName: !Sub ${Environment}-base-python-utils
      Description: Common AWS SDK + shared Python helpers
      ContentUri: layers/base-python-utils/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Retain

  # DynamoDB Table
  ShoppingCartTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-shopping-cart
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: productId-index
          KeySchema:
            - AttributeName: productId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expirationTime
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # Cognito User Pool
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${Environment}-shopping-cart-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  # Cognito User Pool Client
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${Environment}-shopping-cart-web
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # API Gateway
  ShoppingCartApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${Environment}-shopping-cart-api
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization,X-Cart-ID'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        MaxAge: "'3600'"

  # Lambda Functions
  ProductsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-products-list
      CodeUri: lambdas/products-list/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /product
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  ProductsGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-products-get
      CodeUri: lambdas/products-get/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /product/{product_id}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  CartListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-list
      CodeUri: lambdas/cart-list/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  CartAddFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-add
      CodeUri: lambdas/cart-add/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
          PRODUCT_AGGREGATE_UPDATE_FUNCTION_NAME: !Ref ProductAggregateUpdateFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
        - LambdaInvokePolicy:
            FunctionName: !Ref ProductAggregateUpdateFunction
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  CartUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-update
      CodeUri: lambdas/cart-update/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
          PRODUCT_AGGREGATE_UPDATE_FUNCTION_NAME: !Ref ProductAggregateUpdateFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
        - LambdaInvokePolicy:
            FunctionName: !Ref ProductAggregateUpdateFunction
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/{product_id}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  CartMigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-migrate
      CodeUri: lambdas/cart-migrate/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
          CART_DELETE_FUNCTION_NAME: !Ref CartDeleteItemsFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
        - LambdaInvokePolicy:
            FunctionName: !Ref CartDeleteItemsFunction
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/migrate
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  CartCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-checkout
      CodeUri: lambdas/cart-checkout/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
          CART_DELETE_FUNCTION_NAME: !Ref CartDeleteItemsFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
        - LambdaInvokePolicy:
            FunctionName: !Ref CartDeleteItemsFunction
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/checkout
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  CartTotalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-total
      CodeUri: lambdas/cart-total/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ShoppingCartApi
            Path: /cart/{product_id}/total
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # Internal Lambda Functions (No API Gateway events)
  CartDeleteItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-delete-items
      CodeUri: lambdas/cart-delete-items/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable

  ProductAggregateUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-product-aggregate-update
      CodeUri: lambdas/product-aggregate-update/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable

  CartCleanupExpiredFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cart-cleanup-expired
      CodeUri: lambdas/cart-cleanup-expired/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable

  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-cognito-post-confirmation
      CodeUri: lambdas/cognito-post-confirmation/
      Handler: handler.lambda_handler
      Layers:
        - !Ref BasePythonUtilsLayer
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ShoppingCartTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShoppingCartTable
      Events:
        PostConfirmationTrigger:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ShoppingCartApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl

  ShoppingCartTableName:
    Description: DynamoDB table name
    Value: !Ref ShoppingCartTable
    Export:
      Name: !Sub ${AWS::StackName}-ShoppingCartTableName

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId
